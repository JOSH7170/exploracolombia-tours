  <script>
    (function() {
      var serverDown = false;
      function showError() {
        if (serverDown) return;
        serverDown = true;
        document.documentElement.innerHTML =
          '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:#f5f5f5;color:#333;text-align:center;padding:2rem">' +

          '</div>';
      }
      function checkServer() {
        fetch('/api/stats', { cache: 'no-store', signal: AbortSignal.timeout(3000) })
          .catch(showError);
      }
      window.addEventListener('pageshow', checkServer);
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) checkServer();
      });
      setInterval(checkServer, 5000);
    })();
  </script>
