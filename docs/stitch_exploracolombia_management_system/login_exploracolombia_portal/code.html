<script>
        // Micro-interaction: Mouse parallax for the glass card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.glass-card');
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
        });

        // Icon handling for material symbols
        document.querySelectorAll('[data-icon]').forEach(el => {
            const iconName = el.getAttribute('data-icon');
            const span = document.createElement('span');
            span.className = 'material-symbols-outlined';
            span.textContent = iconName;
            
            // Check for weight/fill
            if (el.getAttribute('data-weight') === 'fill') {
                span.style.fontVariationSettings = "'FILL' 1";
            }
            
            // If the element is meant to BE the icon (like in the inputs)
            if (el.tagName === 'SPAN' && el.classList.contains('material-symbols-outlined')) {
                el.textContent = iconName;
            } else {
                // If it's a wrapper, we replace its content or append
                el.innerHTML = '';
                el.appendChild(span);
            }
        });
    </script>
